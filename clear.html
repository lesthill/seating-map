<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Cache Buster</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#080d13;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'Courier New',monospace;padding:20px}
  .card{background:#0c1117;border:1px solid #1e3a5f30;border-radius:12px;padding:24px;max-width:360px;width:100%;text-align:center}
  h1{color:#f87171;font-size:14px;letter-spacing:4px;margin-bottom:16px}
  .btn{width:100%;padding:16px;border:none;border-radius:8px;font-size:15px;font-weight:700;font-family:inherit;margin-bottom:10px;cursor:pointer}
  .btn-red{background:#f87171;color:#080d13}
  .btn-orange{background:#fb923c;color:#080d13}
  .btn-green{background:#4ade80;color:#080d13}
  .log{margin-top:16px;text-align:left;font-size:11px;color:#94a3b8;max-height:200px;overflow-y:auto;line-height:1.8}
  .ok{color:#4ade80}.err{color:#f87171}.info{color:#7dd3fc}
</style>
</head>
<body>
<div class="card">
  <h1>CACHE BUSTER</h1>
  <button class="btn btn-red" onclick="nukeEverything()">Nuke All Caches + SW</button>
  <button class="btn btn-orange" onclick="clearCaches()">Clear Caches Only</button>
  <button class="btn btn-green" onclick="reload()">Reload App</button>
  <div class="log" id="log"></div>
</div>
<script>
function log(msg, cls) {
  const el = document.getElementById('log');
  el.innerHTML += `<div class="${cls||''}">${msg}</div>`;
  el.scrollTop = el.scrollHeight;
}

async function clearCaches() {
  log('Clearing all caches...', 'info');
  try {
    const names = await caches.keys();
    if (!names.length) { log('No caches found.', 'info'); return; }
    for (const name of names) {
      await caches.delete(name);
      log(`Deleted cache: ${name}`, 'ok');
    }
    log('All caches cleared.', 'ok');
  } catch (e) { log(`Error: ${e.message}`, 'err'); }
}

async function unregisterSW() {
  log('Unregistering service workers...', 'info');
  try {
    const regs = await navigator.serviceWorker.getRegistrations();
    if (!regs.length) { log('No service workers found.', 'info'); return; }
    for (const reg of regs) {
      await reg.unregister();
      log(`Unregistered SW: ${reg.scope}`, 'ok');
    }
    log('All service workers removed.', 'ok');
  } catch (e) { log(`Error: ${e.message}`, 'err'); }
}

async function nukeEverything() {
  log('=== NUKING EVERYTHING ===', 'err');
  await clearCaches();
  await unregisterSW();
  // Clear localStorage for our apps
  const keys = Object.keys(localStorage);
  keys.forEach(k => { localStorage.removeItem(k); log(`Cleared localStorage: ${k}`, 'ok'); });
  log('=== DONE. Tap "Reload App" to get fresh version. ===', 'ok');
}

function reload() {
  window.location.href = '/index.html?' + Date.now();
}
</script>
</body>
</html>
